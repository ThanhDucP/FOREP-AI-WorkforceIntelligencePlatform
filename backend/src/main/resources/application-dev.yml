spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/forep_db
    username: postgres
    password: password
    
  jpa:
    hibernate:
      ddl-auto: validate # Flyway handles schema, JPA only validates
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

logging:
  level:
    root: INFO
    com.aiworkforce: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
