spring:
  application:
    name: ai-workforce-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  
  datasource:
    driver-class-name: org.postgresql.Driver
    
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
server:
  port: 8080

# Application Configurations for Platform
app:
  seed-demo-data: ${APP_SEED_DEMO_DATA:false}
  database:
    reset-on-start: ${APP_DATABASE_RESET_ON_START:false}
    reset-schema: ${APP_DATABASE_RESET_SCHEMA:public}
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
      access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:86400000} # 1 day
      refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:604800000} # 7 days
    oauth2:
      enabled: false
      success-redirect-uri: ${OAUTH2_SUCCESS_REDIRECT_URI:http://localhost:3000/auth/oauth2/callback}
      failure-redirect-uri: ${OAUTH2_FAILURE_REDIRECT_URI:http://localhost:3000/login?oauth2=failed}
    token-protection:
      key: ${TOKEN_PROTECTION_KEY:dev-change-me-token-protection-key}

ai:
  provider: ${AI_PROVIDER:gemini}
  model: ${AI_MODEL:gemini-2.5-flash}
  gemini:
    api-key: ${GEMINI_API_KEY:}
    timeout-seconds: ${GEMINI_TIMEOUT_SECONDS:30}
  openai:
    api-key: ${OPENAI_API_KEY:}
    timeout-seconds: ${OPENAI_TIMEOUT_SECONDS:30}
  rag:
    enabled: ${AI_RAG_ENABLED:true}
    max-context-characters: ${AI_RAG_MAX_CONTEXT_CHARACTERS:4000}
    max-tasks: ${AI_RAG_MAX_TASKS:12}
    max-previous-insights: ${AI_RAG_MAX_PREVIOUS_INSIGHTS:3}

integration:
  sync:
    enabled: ${INTEGRATION_SYNC_ENABLED:true}
    cron: ${INTEGRATION_SYNC_CRON:0 */15 * * * *}
    success-interval-minutes: ${INTEGRATION_SYNC_SUCCESS_INTERVAL_MINUTES:30}
    failure-retry-delay-minutes: ${INTEGRATION_SYNC_FAILURE_RETRY_DELAY_MINUTES:10}

---
spring:
  config:
    activate:
      on-profile: oauth2-google
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - openid
              - profile
              - email
app:
  security:
    oauth2:
      enabled: true

---
spring:
  config:
    activate:
      on-profile: oauth2-github
  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET}
            scope:
              - read:user
              - user:email
        provider:
          github:
            user-name-attribute: id
app:
  security:
    oauth2:
      enabled: true

---
spring:
  config:
    activate:
      on-profile: oauth2-jira
  security:
    oauth2:
      client:
        registration:
          jira:
            client-id: ${JIRA_CLIENT_ID}
            client-secret: ${JIRA_CLIENT_SECRET}
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - read:me
        provider:
          jira:
            authorization-uri: https://auth.atlassian.com/authorize
            token-uri: https://auth.atlassian.com/oauth/token
            user-info-uri: https://api.atlassian.com/me
            user-name-attribute: account_id
app:
  security:
    oauth2:
      enabled: true
