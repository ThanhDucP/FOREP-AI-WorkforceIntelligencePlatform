$kind: http-request
name: Check In GPS
method: POST
url: '{{base_url}}/api/v1/attendance/check-in'
order: 1000
headers:
  - key: Authorization
    value: 'Bearer {{jwt_token}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "latitude": 21.0285,
      "longitude": 105.8521
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 200 or 201", function () {
        pm.expect(pm.response.code).to.be.oneOf([200, 201]);
      });
      pm.test("Check-in successful", function () {
        var json = pm.response.json();
        pm.expect(json.status).to.eql("SUCCESS");
      });
