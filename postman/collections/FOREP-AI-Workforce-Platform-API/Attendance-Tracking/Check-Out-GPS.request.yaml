$kind: http-request
name: Check Out GPS
method: POST
url: '{{base_url}}/api/v1/attendance/check-out'
order: 2000
headers:
  - key: Authorization
    value: 'Bearer {{jwt_token}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "latitude": 21.0285,
      "longitude": 105.8521
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 200 OK", function () {
        pm.response.to.have.status(200);
      });
      pm.test("Check-out successful", function () {
        var json = pm.response.json();
        pm.expect(json.status).to.eql("SUCCESS");
      });
