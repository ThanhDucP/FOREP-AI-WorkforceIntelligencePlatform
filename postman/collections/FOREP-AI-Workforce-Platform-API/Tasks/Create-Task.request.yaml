$kind: http-request
name: Create Task
method: POST
url: '{{base_url}}/api/v1/tasks'
order: 1000
headers:
  - key: Authorization
    value: 'Bearer {{jwt_token}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "title": "Implement Frontend Auth Flow",
      "description": "Integrate login, register, and token management in React/TypeScript.",
      "priority": "HIGH",
      "dueDate": "2026-05-25T17:00:00",
      "estimatedHours": 6,
      "assigneeId": "{{employee_id}}",
      "reporterId": "{{manager_id}}",
      "teamId": "{{team_id}}",
      "sprintId": "{{sprint_id}}",
      "externalTicketRef": "FOREP-POSTMAN",
      "sprintNumber": 1,
      "storyPoints": 5
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 200 OK", function () {
        pm.response.to.have.status(200);
      });
      pm.test("Task created with ID", function () {
        var json = pm.response.json();
        pm.expect(json.data).to.have.property("id");
        if (json.data && json.data.id) {
          pm.environment.set("task_id", json.data.id);
        }
      });
