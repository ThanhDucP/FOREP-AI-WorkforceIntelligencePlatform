$kind: http-request
name: Get Tasks By Reporter
method: GET
url: '{{base_url}}/api/v1/tasks/reported-by/{{employee_id}}'
order: 3060
headers:
  - key: Authorization
    value: 'Bearer {{jwt_token}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 200 OK", function () {
        pm.response.to.have.status(200);
      });
      pm.test("Tasks response is array", function () {
        pm.expect(pm.response.json().data).to.be.an("array");
      });
