$kind: http-request
name: Update Task Status
method: PATCH
url: '{{base_url}}/api/v1/tasks/{{task_id}}/status'
order: 4000
headers:
  - key: Authorization
    value: 'Bearer {{jwt_token}}'
queryParams:
  - key: status
    value: DONE
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 200 OK", function () {
        pm.response.to.have.status(200);
      });
      pm.test("Task status updated", function () {
        var json = pm.response.json();
        pm.expect(json.status).to.eql("SUCCESS");
      });
