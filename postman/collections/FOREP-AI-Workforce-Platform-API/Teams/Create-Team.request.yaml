$kind: http-request
name: 'Create Team (Admin Only)'
method: POST
url: '{{base_url}}/api/v1/teams'
order: 3000
headers:
  - key: Authorization
    value: 'Bearer {{jwt_token}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "Engineering Team",
      "description": "Core engineering and development team",
      "organizationId": "{{organization_id}}",
      "managerId": "{{employee_id}}"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response has success structure", function () {
          const json = pm.response.json();
          pm.expect(json).to.have.property("success", true);
          pm.expect(json).to.have.property("data");
      });

      pm.test("Created team has required fields", function () {
          const team = pm.response.json().data;
          pm.expect(team).to.have.property("id");
          pm.expect(team).to.have.property("name");
          pm.expect(team.name).to.eql("Engineering Team");
      });

      pm.test("Save team_id to environment", function () {
          const team = pm.response.json().data;
          if (team && team.id) {
              pm.environment.set("team_id", team.id);
              console.log("team_id saved:", team.id);
          }
      });
