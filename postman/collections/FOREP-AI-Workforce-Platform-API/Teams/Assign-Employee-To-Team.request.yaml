$kind: http-request
name: 'Assign Employee To Team (Admin/Manager)'
method: PUT
url: '{{base_url}}/api/v1/teams/{{team_id}}/assign-employee'
order: 5000
headers:
  - key: Authorization
    value: 'Bearer {{jwt_token}}'
  - key: Content-Type
    value: application/json
queryParams:
  - key: employeeId
    value: '{{employee_id}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response has success structure", function () {
          const json = pm.response.json();
          pm.expect(json).to.have.property("success", true);
      });

      pm.test("Assignment completed successfully", function () {
          const json = pm.response.json();
          pm.expect(json.success).to.be.true;
      });
