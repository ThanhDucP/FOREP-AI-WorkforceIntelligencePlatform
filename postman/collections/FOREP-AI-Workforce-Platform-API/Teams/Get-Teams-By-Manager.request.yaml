$kind: http-request
name: Get Teams By Manager
method: GET
url: '{{base_url}}/api/v1/teams/managed-by/{{manager_id}}'
order: 1080
headers:
  - key: Authorization
    value: 'Bearer {{jwt_token}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 200 OK", function () {
        pm.response.to.have.status(200);
      });
      pm.test("Teams response is array", function () {
        pm.expect(pm.response.json().data).to.be.an("array");
      });
