$kind: http-request
name: Get Team By ID
method: GET
url: '{{base_url}}/api/v1/teams/{{team_id}}'
order: 2000
headers:
  - key: Authorization
    value: 'Bearer {{jwt_token}}'
  - key: Content-Type
    value: application/json
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response has success structure", function () {
          const json = pm.response.json();
          pm.expect(json).to.have.property("success", true);
          pm.expect(json).to.have.property("data");
      });

      pm.test("Team has required fields", function () {
          const team = pm.response.json().data;
          pm.expect(team).to.have.property("id");
          pm.expect(team).to.have.property("name");
      });

      pm.test("Team ID matches requested ID", function () {
          const team = pm.response.json().data;
          pm.expect(team.id).to.eql(pm.environment.get("team_id"));
      });
