$kind: http-request
name: 'Delete Team (Admin Only)'
method: DELETE
url: '{{base_url}}/api/v1/teams/{{team_id}}'
order: 6000
headers:
  - key: Authorization
    value: 'Bearer {{jwt_token}}'
  - key: Content-Type
    value: application/json
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response has success structure", function () {
          const json = pm.response.json();
          pm.expect(json).to.have.property("success", true);
      });

      pm.test("Deletion completed successfully", function () {
          const json = pm.response.json();
          pm.expect(json.success).to.be.true;
      });

      pm.test("Clear team_id from environment", function () {
          pm.environment.unset("team_id");
          console.log("team_id cleared from environment after deletion");
      });
