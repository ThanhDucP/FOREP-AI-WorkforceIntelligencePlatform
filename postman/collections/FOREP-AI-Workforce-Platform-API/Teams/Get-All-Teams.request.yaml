$kind: http-request
name: Get All Teams
method: GET
url: '{{base_url}}/api/v1/teams'
order: 1000
headers:
  - key: Authorization
    value: 'Bearer {{jwt_token}}'
  - key: Content-Type
    value: application/json
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response has success structure", function () {
          const json = pm.response.json();
          pm.expect(json).to.have.property("success", true);
          pm.expect(json).to.have.property("data");
      });

      pm.test("Data is an array", function () {
          const json = pm.response.json();
          pm.expect(json.data).to.be.an("array");
      });

      pm.test("Each team has required fields", function () {
          const json = pm.response.json();
          if (json.data.length > 0) {
              const team = json.data[0];
              pm.expect(team).to.have.property("id");
              pm.expect(team).to.have.property("name");
              pm.environment.set("team_id", team.id);
          }
      });
