$kind: http-request
name: Create Sprint (Admin/Manager)
method: POST
url: '{{base_url}}/api/v1/sprints'
order: 5050
headers:
  - key: Authorization
    value: 'Bearer {{jwt_token}}'
  - key: Content-Type
    value: application/json
body:
  mode: raw
  raw: |-
    {
      "sprintNumber": 99,
      "name": "Postman Sprint",
      "startDate": "2026-05-23",
      "endDate": "2026-06-06",
      "committedStoryPoints": 40,
      "velocityConfidence": 0.85,
      "status": "PLANNING",
      "organizationId": "{{organization_id}}"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 200 OK", function () {
        pm.response.to.have.status(200);
      });
      pm.test("Save sprint_id", function () {
        const sprint = pm.response.json().data;
        if (sprint && sprint.id) pm.environment.set("sprint_id", sprint.id);
      });
