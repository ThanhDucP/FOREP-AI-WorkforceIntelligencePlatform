$kind: http-request
name: Update Sprint (Admin/Manager)
method: PUT
url: '{{base_url}}/api/v1/sprints/{{sprint_id}}'
order: 5060
headers:
  - key: Authorization
    value: 'Bearer {{jwt_token}}'
  - key: Content-Type
    value: application/json
body:
  mode: raw
  raw: |-
    {
      "sprintNumber": 99,
      "name": "Postman Sprint Updated",
      "startDate": "2026-05-23",
      "endDate": "2026-06-06",
      "committedStoryPoints": 45,
      "completedStoryPoints": 10,
      "velocityConfidence": 0.9,
      "status": "ACTIVE",
      "organizationId": "{{organization_id}}"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 200 OK", function () {
        pm.response.to.have.status(200);
      });
