$kind: http-request
name: 'Generate Burnout Insight (Admin/Manager)'
method: POST
url: '{{base_url}}/api/v1/ai/generate/{{employee_id}}'
order: 1000
headers:
  - key: Authorization
    value: 'Bearer {{jwt_token}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 200 or 201", function () {
        pm.expect(pm.response.code).to.be.oneOf([200, 201]);
      });
      pm.test("Insight generated", function () {
        var json = pm.response.json();
        pm.expect(json.status).to.eql("SUCCESS");
      });
