$kind: http-request
name: Get Organization Workload History
method: GET
url: '{{base_url}}/api/v1/analytics/workload-history/organization/{{organization_id}}?startDate=2026-05-01&endDate=2026-05-31'
order: 7040
headers:
  - key: Authorization
    value: 'Bearer {{jwt_token}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 200 OK", function () {
        pm.response.to.have.status(200);
      });
      pm.test("Workload response is array", function () {
        pm.expect(pm.response.json().data).to.be.an("array");
      });
