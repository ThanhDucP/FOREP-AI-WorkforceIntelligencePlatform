$kind: http-request
name: Get AI Suggestions
method: GET
url: '{{base_url}}/api/v1/ai/suggestions?sprintNumber={{sprint_number}}'
order: 8100
headers:
  - key: Authorization
    value: 'Bearer {{jwt_token}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 200 OK", function () {
        pm.response.to.have.status(200);
      });
      pm.test("Suggestions response is array", function () {
        pm.expect(pm.response.json().data).to.be.an("array");
      });
