$kind: http-request
name: Adopt AI Suggestion (Admin/Manager)
method: POST
url: '{{base_url}}/api/v1/ai/suggestions/{{suggestion_id}}/adopt'
order: 8150
headers:
  - key: Authorization
    value: 'Bearer {{jwt_token}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 200 OK", function () {
        pm.response.to.have.status(200);
      });
