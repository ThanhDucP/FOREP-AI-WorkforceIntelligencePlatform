$kind: http-request
name: 'Update Employee By ID (Admin Only)'
method: PUT
url: '{{base_url}}/api/v1/employees/{{employee_id}}'
order: 5000
headers:
  - key: Authorization
    value: 'Bearer {{jwt_token}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "firstName": "Thanh AdminEdit",
      "lastName": "Duc",
      "phone": "0987654323",
      "department": "Management"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 200 OK", function () {
        pm.response.to.have.status(200);
      });
      pm.test("Employee updated", function () {
        var json = pm.response.json();
        pm.expect(json.status).to.eql("SUCCESS");
      });
