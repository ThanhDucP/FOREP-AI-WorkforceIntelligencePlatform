$kind: http-request
name: 'Delete Employee (Admin Only)'
method: DELETE
url: '{{base_url}}/api/v1/employees/{{employee_id}}'
order: 6000
headers:
  - key: Authorization
    value: 'Bearer {{jwt_token}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 200 or 204", function () {
        pm.expect(pm.response.code).to.be.oneOf([200, 204]);
      });
