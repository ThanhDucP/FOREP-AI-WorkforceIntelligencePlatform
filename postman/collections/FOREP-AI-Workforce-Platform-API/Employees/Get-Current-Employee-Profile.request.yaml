$kind: http-request
name: Get Current Employee Profile
method: GET
url: '{{base_url}}/api/v1/employees/profile'
order: 1000
headers:
  - key: Authorization
    value: 'Bearer {{jwt_token}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 200 OK", function () {
        pm.response.to.have.status(200);
      });
      pm.test("Response has employee profile", function () {
        var json = pm.response.json();
        pm.expect(json.data).to.have.property("email");
      });
