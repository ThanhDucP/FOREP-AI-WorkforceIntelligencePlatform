$kind: http-request
name: Get Employees By Organization
method: GET
url: '{{base_url}}/api/v1/employees/organization/{{organization_id}}'
order: 2070
headers:
  - key: Authorization
    value: 'Bearer {{jwt_token}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 200 OK", function () {
        pm.response.to.have.status(200);
      });
      pm.test("Employees response is array", function () {
        pm.expect(pm.response.json().data).to.be.an("array");
      });
