$kind: http-request
name: 'Get Admin Dashboard Stats (Admin Only)'
method: GET
url: '{{base_url}}/api/v1/admin/dashboard'
order: 2000
headers:
  - key: Authorization
    value: 'Bearer {{jwt_token}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 200 OK", function () {
        pm.response.to.have.status(200);
      });
      pm.test("Admin dashboard has stats", function () {
        var json = pm.response.json();
        pm.expect(json.data).to.exist;
      });
