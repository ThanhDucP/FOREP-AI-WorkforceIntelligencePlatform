$kind: http-request
name: Update Organization (Admin Only)
method: PUT
url: "{{base_url}}/api/v1/organizations/{{organization_id}}"
order: 4000
headers:
  Authorization: Bearer {{jwt_token}}
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "name": "EXE201_FOREP",
      "domain": "forep.local",
      "latitude": 21.0284,
      "longitude": 105.8521,
      "allowedRadiusMeters": 200
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status 200 OK", function () {
        pm.response.to.have.status(200);
      });
      pm.test("Organization updated", function () {
        var json = pm.response.json();
        pm.expect(json.status).to.eql("SUCCESS");
      });
    language: text/javascript
